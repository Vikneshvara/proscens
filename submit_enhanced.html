<!DOCTYPE html>
<html>
<head>
    <title>Submit Enhanced Project - Proscens</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>🚀 Submit Enhanced Project</h1>
    <a href="/">Back to Home</a>
    <hr>
    <form method="POST" enctype="multipart/form-data">
        <label>Title:</label>
        <input type="text" name="title" required><br>
        <label>Description:</label>
        <textarea name="description" required></textarea><br>
        <label>Tutorial Link:</label>
        <input type="url" name="tutorial"><br>
        <label>Category:</label>
        <select name="category">
            <option value="STEM">STEM</option>
            <option value="AI">AI</option>
            <option value="Web Development">Web Development</option>
            <option value="Mobile Apps">Mobile Apps</option>
            <option value="Games">Games</option>
            <option value="Data Science">Data Science</option>
            <option value="IoT">IoT</option>
            <option value="Other">Other</option>
        </select><br>
        <label>Tags (comma-separated):</label>
        <input type="text" name="tags" placeholder="python, ai, machine learning"><br>
        <label>Project Image:</label>
        <input type="file" name="project_image" accept="image/*"><br>
        <button type="submit">Submit Project (+50 XP)</button>
    </form>
</div>
</body>
</html>
